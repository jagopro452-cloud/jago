name: jago-platform
region: blr
databases:
  - name: jago-db
    engine: PG
    version: "16"
    production: true
    size: db-s-dev-database
  - name: jago-redis
    engine: REDIS
    version: "7"
    production: true
    size: db-s-1vcpu-1gb
services:
  - name: jago-server
    source_dir: /
    github:
      repo: jagopro452-cloud/jago
      branch: master
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 2
    instance_size_slug: basic-s
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        value: ${jago-db.DATABASE_URL}
        type: SECRET
      - key: ADMIN_EMAIL
        value: "kiranatmakuri518@gmail.com"
