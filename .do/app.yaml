name: jago-platform
region: blr
services:
  - name: jago-server
    source_dir: /
    github:
      repo: jagopro452-cloud/jago
      branch: master
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node dist/index.js
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-s
