name: Build All APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'flutter_apps/**'
      - '.github/workflows/build-all-apks.yml'

jobs:
  build-driver:
    name: JAGO Pilot (Driver App)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: flutter_apps/driver_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Get dependencies
        working-directory: flutter_apps/driver_app
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: flutter_apps/driver_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        working-directory: flutter_apps/driver_app
        run: flutter build apk --debug

      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: JAGO-Pilot-Driver-APK
          path: flutter_apps/driver_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build-customer:
    name: JAGO Customer App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: flutter_apps/customer_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Get dependencies
        working-directory: flutter_apps/customer_app
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: flutter_apps/customer_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        working-directory: flutter_apps/customer_app
        run: flutter build apk --debug

      - name: Upload Customer APK
        uses: actions/upload-artifact@v4
        with:
          name: JAGO-Customer-APK
          path: flutter_apps/customer_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
