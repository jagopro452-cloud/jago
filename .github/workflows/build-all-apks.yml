name: Build JAGO APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'flutter_apps/**'
      - '.github/workflows/build-all-apks.yml'

jobs:
  build-customer:
    name: JAGO Customer App (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: flutter_apps/customer_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Install dependencies
        working-directory: flutter_apps/customer_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_apps/customer_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build Release APK
        working-directory: flutter_apps/customer_app
        run: flutter build apk --release --no-shrink

      - name: Upload Customer APK
        uses: actions/upload-artifact@v4
        with:
          name: JAGO-Customer-App-${{ github.run_number }}
          path: flutter_apps/customer_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  build-driver:
    name: JAGO Pilot Driver App (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: flutter_apps/driver_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Install dependencies
        working-directory: flutter_apps/driver_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_apps/driver_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build Release APK
        working-directory: flutter_apps/driver_app
        run: flutter build apk --release --no-shrink

      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: JAGO-Pilot-Driver-App-${{ github.run_number }}
          path: flutter_apps/driver_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
