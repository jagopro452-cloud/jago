name: Build Customer App APK

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_apps/customer_app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build JAGO Customer APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: flutter_apps/customer_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: flutter_apps/customer_app
        run: flutter build apk --debug --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jago-customer-apk
          path: flutter_apps/customer_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
