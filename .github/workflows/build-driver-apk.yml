name: Build Driver App APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_apps/driver_app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build JAGO Pilot (Driver) APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: flutter_apps/driver_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Get dependencies
        working-directory: flutter_apps/driver_app
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: flutter_apps/driver_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        working-directory: flutter_apps/driver_app
        run: flutter build apk --debug --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JAGO-Pilot-Driver-APK-${{ github.run_number }}
          path: flutter_apps/driver_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
