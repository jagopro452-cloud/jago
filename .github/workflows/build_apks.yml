name: Build Flutter APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app_name: customer
            app_dir: jago_app-main/flutter_apps/customer_app
            artifact_name: jago-customer-release-apk
          - app_name: driver
            app_dir: jago_app-main/flutter_apps/driver_app
            artifact_name: jago-driver-release-apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      - name: Install dependencies
        working-directory: ${{ matrix.app_dir }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ matrix.app_dir }}
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.app_dir }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
