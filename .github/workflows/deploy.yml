name: Deploy to DigitalOcean

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /var/www/jago
          git pull origin master

      - name: Install dependencies
        run: |
          cd /var/www/jago
          npm ci --prefer-offline

      - name: Build production bundle
        run: |
          cd /var/www/jago
          npm run build

      - name: Restart server
        run: |
          cd /var/www/jago
          set -a && source .env && set +a
          pm2 restart jago --update-env || pm2 start dist/index.js --name jago --max-memory-restart 512M
          pm2 save

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:5000/api/health && echo "Deploy OK" || echo "WARNING: health check failed"
