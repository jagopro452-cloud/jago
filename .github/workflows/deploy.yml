name: App Platform Auto Deploy

on:
  push:
    branches: [master]

jobs:
  app-platform-config-check:
    name: Validate App Platform Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify App Platform spec is present
        run: |
          test -f .do/app.yaml
          grep -q "deploy_on_push: true" .do/app.yaml
          grep -q "repo: jagopro452-cloud/jago" .do/app.yaml
          grep -q "branch: master" .do/app.yaml

      - name: Explain deployment mode
        run: |
          echo "DigitalOcean App Platform deploys this repo automatically on push."
          echo "This workflow only validates the .do/app.yaml wiring and avoids legacy SSH deploy failures."
