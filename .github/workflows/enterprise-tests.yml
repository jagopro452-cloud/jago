name: Enterprise Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full suite run at 2 AM IST (8:30 PM UTC)
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - web
          - security
          - load
          - mobile

env:
  NODE_ENV: test
  TEST_BASE_URL: http://localhost:5000
  TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
  TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
  RAZORPAY_KEY_ID: ${{ secrets.TEST_RAZORPAY_KEY_ID }}
  RAZORPAY_KEY_SECRET: ${{ secrets.TEST_RAZORPAY_KEY_SECRET }}

jobs:
  # ── Unit & Integration Tests ───────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run existing unit tests
        run: npm test -- --reporter=json --outputFile=test-results/unit.json

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/

  # ── API Tests ──────────────────────────────────────────────────────────
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'api' || github.event_name != 'workflow_dispatch' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jago_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/jago_test

      - name: Start server
        run: |
          npm run dev &
          npx wait-on http://localhost:5000/api/health --timeout 60000
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/jago_test

      - name: Run API tests
        run: |
          npx vitest run tests/enterprise/api/ --reporter=json --outputFile=test-results/api.json

      - name: Run Socket tests
        run: |
          npx vitest run tests/enterprise/socket/ --reporter=json --outputFile=test-results/socket.json

      - name: Run Payment tests
        run: |
          npx vitest run tests/enterprise/payment/ --reporter=json --outputFile=test-results/payment.json

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: test-results/

  # ── Security Tests ─────────────────────────────────────────────────────
  security-tests:
    name: OWASP Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'security' || github.event_name != 'workflow_dispatch' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jago_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm run dev &
          npx wait-on http://localhost:5000/api/health --timeout 60000
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/jago_test

      - name: Run security tests
        run: |
          npx vitest run tests/enterprise/security/ --reporter=json --outputFile=test-results/security.json

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: test-results/

  # ── Web E2E Tests (Playwright) ─────────────────────────────────────────
  web-e2e-tests:
    name: Playwright Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'web' || github.event_name != 'workflow_dispatch' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jago_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Start server
        run: |
          npm run dev &
          npx wait-on http://localhost:5000/api/health --timeout 60000
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/jago_test

      - name: Run Playwright tests
        run: |
          npx playwright test --config=tests/enterprise/web/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/enterprise/reports/playwright/
            test-results/

      - name: Upload screenshots/videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            tests/enterprise/reports/playwright/screenshots/
            tests/enterprise/reports/playwright/videos/

  # ── Load Tests (k6) — Nightly Only ────────────────────────────────────
  load-tests:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [api-tests, security-tests]
    if: ${{ github.event_name == 'schedule' || github.event.inputs.test_type == 'load' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jago_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install deps & start server
        run: |
          npm ci
          npm run dev &
          npx wait-on http://localhost:5000/api/health --timeout 60000
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/jago_test

      - name: Run API load test
        run: |
          mkdir -p tests/enterprise/reports/k6
          k6 run tests/enterprise/load/k6-load-test.js --out json=tests/enterprise/reports/k6/results.json

      - name: Run endpoint soak test
        run: |
          k6 run tests/enterprise/load/k6-endpoint-soak.js --out json=tests/enterprise/reports/k6/soak-results.json

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: tests/enterprise/reports/k6/

  # ── Test Summary ───────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, security-tests, web-e2e-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Generate summary
        run: |
          echo "## 🧪 Enterprise Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web E2E Tests | ${{ needs.web-e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
