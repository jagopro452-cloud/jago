version: "3.9"
services:
  jago-api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ../../.env.production
    ports:
      - "5000:5000"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
