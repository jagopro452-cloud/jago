apiVersion: apps/v1
kind: Deployment
metadata:
  name: jago-api
  labels:
    app: jago-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jago-api
  template:
    metadata:
      labels:
        app: jago-api
    spec:
      containers:
        - name: jago-api
          image: ghcr.io/your-org/jago-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: jago-api-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
