name: jago_pilot
description: JAGO Pilot - Driver App by MindWhile IT Solutions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  permission_handler: ^11.3.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  pin_code_fields: ^8.0.1
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.1.2
  camera: ^0.10.5+9
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
