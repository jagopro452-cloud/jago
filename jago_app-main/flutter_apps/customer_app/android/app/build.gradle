plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def googleMapsKey = localProperties.getProperty('GOOGLE_MAPS_CUSTOMER_KEY')
if (!googleMapsKey) {
    googleMapsKey = System.getenv('GOOGLE_MAPS_CUSTOMER_KEY')
}
if (!googleMapsKey) {
    googleMapsKey = localProperties.getProperty('GOOGLE_MAPS_KEY')
}
if (!googleMapsKey) {
    googleMapsKey = System.getenv('GOOGLE_MAPS_KEY')
}
if (!googleMapsKey) {
    throw new GradleException("Customer GOOGLE_MAPS key missing. Add GOOGLE_MAPS_CUSTOMER_KEY or GOOGLE_MAPS_KEY to android/local.properties or environment variables.")
}
def releaseStoreFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
def hasReleaseSigning = releaseStoreFile != null &&
    releaseStoreFile.exists() &&
    keystoreProperties['storePassword'] &&
    keystoreProperties['keyPassword'] &&
    keystoreProperties['keyAlias']
if (!hasReleaseSigning) {
    throw new GradleException("Release signing is required for Maps-restricted Android builds. Missing android/key.properties or keystore.")
}

android {
    namespace "com.mindwhile.jago_customer"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile releaseStoreFile
            storePassword keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId "com.mindwhile.jago_customer"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 90
        versionName "1.0.90"
        multiDexEnabled true
        manifestPlaceholders = [googleMapsApiKey: googleMapsKey]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ""
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'androidx.multidex:multidex:2.0.1'
}
