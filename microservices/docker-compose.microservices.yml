version: "3.9"

services:
  gateway-service:
    build: ./gateway-service
    container_name: jago-gateway-service
    ports:
      - "7000:7000"
    environment:
      - GATEWAY_PORT=7000
      - MONOLITH_BASE_URL=http://host.docker.internal:5000
      - MATCHING_SERVICE_URL=http://matching-service:7101
      - TRIP_SERVICE_URL=http://trip-service:7102
      - LOCATION_SERVICE_URL=http://location-service:7103
      - AI_ASSISTANT_SERVICE_URL=http://ai-assistant-service:7104
    depends_on:
      - matching-service
      - trip-service
      - location-service
      - ai-assistant-service

  matching-service:
    build: ./matching-service
    container_name: jago-matching-service
    ports:
      - "7101:7101"
    environment:
      - MATCHING_PORT=7101
      - DISPATCH_ACCEPTANCE_SECONDS=20
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  trip-service:
    build: ./trip-service
    container_name: jago-trip-service
    ports:
      - "7102:7102"
    environment:
      - TRIP_PORT=7102

  location-service:
    build: ./location-service
    container_name: jago-location-service
    ports:
      - "7103:7103"
    environment:
      - LOCATION_PORT=7103
      - LOCATION_STREAM_INTERVAL_MS=2500
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  ai-assistant-service:
    build: ./ai-assistant-service
    container_name: jago-ai-assistant-service
    ports:
      - "7104:7104"
    environment:
      - AI_ASSISTANT_PORT=7104

  redis:
    image: redis:7-alpine
    container_name: jago-ms-redis
    ports:
      - "6379:6379"
